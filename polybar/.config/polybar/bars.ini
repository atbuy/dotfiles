[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 30
radius = 8

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true
line-size = 0
border-size = 0

padding-left = 1
padding-right = 2
module-margin = 1

separator = "  "
separator-foreground = ${colors.overlay0}

font-0 = JetBrainsMono Nerd Font Mono:size=12;3
font-1 = JetBrainsMono Nerd Font:size=12;3

modules-left = i3 cpu memory
modules-center = ${env:POLYBAR_CENTER:}
modules-right = ${env:POLYBAR_RIGHT:wlan battery date}

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
screenchange-reload = true
pseudo-transparency = true
