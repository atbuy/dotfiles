backend = "glx";
log-level = "warn";

shadow = true;
shadow-radius = 18;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.35;

shadow-exclude = [
  "_GTK_FRAME_EXTENTS@",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'utility'",
  "name = 'Notification'",
  "class_g = 'Conky'"
];

fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-exclude = [ ];

inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;

# blur-background = false;
blur-background = true;
blur-method = "kernel";
blur-kern = "5x5box";

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

use-damage = true;

focus-exclude = [ "class_g = 'Cairo-clock'" ];
invert-color-include = [ ];
opacity-exclude = [ "name = 'Stratagus'" ];

wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 1; };
  dropdown_menu = { opacity = 1; };
};
